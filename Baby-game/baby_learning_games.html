<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아기 두뇌 게임 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Jua&display=swap" rel="stylesheet">
<style>
/*
  🎨 뇌발달 기반 색 팔레트 (연구 근거)
  ─────────────────────────────────────────────────────────
  ① 순도(채도) 높은 원색: 영아 피질 활성화 극대화 (NIH/PLOS ONE 2024)
  ② 고대비 조합: 시각 경로 자극, 신경 연결 강화 (Dr. Sears Wellness Inst.)
  ③ 따뜻한 노랑+빨강: 집중력·각성 유도 (Enfamil/APA 연구)
  ④ 차분한 파랑+초록: 게임 사이 전환 시 감정 조절
  ⑤ 크림 배경: 과자극 방지, 색상 팝아웃 효과 극대화
  ─────────────────────────────────────────────────────────
*/
:root {
  /* 게임별 주조색 — 원색 고채도 */
  --train-primary:   #FF4D4D;   /* 빨강: 자극·각성 → 색깔기차 */
  --train-secondary: #FFD93D;   /* 노랑: 집중·인지 */
  --train-accent:    #1A1A2E;   /* 고대비 다크 */

  --animal-primary:  #06D6A0;   /* 초록: 자연·탐색 → 동물분류 */
  --animal-secondary:#118AB2;   /* 파랑: 안정·집중 */
  --animal-accent:   #073B4C;

  --rhythm-primary:  #FF6B35;   /* 주황: 에너지·리듬 → 박자게임 */
  --rhythm-secondary:#F7C59F;   /* 연주황: 온화한 리듬감 */
  --rhythm-accent:   #1D1B00;

  --fruit-primary:   #7B2D8B;   /* 보라: 상상력·수 감각 → 과일바구니 */
  --fruit-secondary: #F9C74F;   /* 황금: 숫자 강조 */
  --fruit-accent:    #240046;

  /* 전역 */
  --cream:           #FFFBF0;   /* 크림 배경: 과자극 방지 */
  --dark:            #1A1A2E;
  --white:           #FFFFFF;
  --shadow-warm:     rgba(255, 77, 77, 0.15);

  --font-display: 'Jua', sans-serif;
  --font-body: 'Nunito', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 배경 ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 10% 20%, rgba(255,77,77,.06) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(6,214,160,.06) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(123,45,139,.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

/* ── 메인 레이아웃 ── */
#app { position: relative; z-index: 1; }

/* ─────────── 홈 화면 ─────────── */
#home-screen {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem 1.5rem;
}

.home-title {
  font-family: var(--font-display);
  font-size: clamp(2.4rem, 8vw, 4rem);
  color: var(--dark);
  text-align: center;
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.home-title span {
  display: inline-block;
  animation: float 2.5s ease-in-out infinite;
}
.home-title span:nth-child(2) { animation-delay: .2s; }
.home-title span:nth-child(3) { animation-delay: .4s; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.home-subtitle {
  font-size: 1rem;
  color: #666;
  text-align: center;
  margin-bottom: 3rem;
  font-weight: 600;
}

/* 게임 카드 그리드 */
.game-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.2rem;
  width: 100%;
  max-width: 640px;
}

.game-card {
  border-radius: 24px;
  padding: 1.6rem 1.4rem;
  cursor: pointer;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s;
  position: relative; overflow: hidden;
  border: 3px solid transparent;
  user-select: none;
}
.game-card:hover  { transform: scale(1.05) rotate(-1deg); }
.game-card:active { transform: scale(.97); }

.game-card::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,.15);
  border-radius: inherit;
}

/* 카드별 배경색 (게임 주조색) */
.card-train  { background: var(--train-primary); box-shadow: 0 8px 32px rgba(255,77,77,.35); }
.card-animal { background: var(--animal-primary); box-shadow: 0 8px 32px rgba(6,214,160,.35); }
.card-rhythm { background: var(--rhythm-primary); box-shadow: 0 8px 32px rgba(255,107,53,.35); }
.card-fruit  { background: var(--fruit-primary); box-shadow: 0 8px 32px rgba(123,45,139,.35); }

.card-emoji { font-size: 2.8rem; display: block; margin-bottom: .6rem; }
.card-title {
  font-family: var(--font-display);
  font-size: 1.25rem;
  color: #fff;
  line-height: 1.2;
  margin-bottom: .3rem;
}
.card-desc { font-size: .78rem; color: rgba(255,255,255,.85); font-weight: 600; }
.card-badge {
  position: absolute; top: 12px; right: 12px;
  background: rgba(255,255,255,.25);
  color: #fff; font-size: .65rem; font-weight: 800;
  padding: 3px 8px; border-radius: 20px;
}

/* ─────────── 게임 화면 (공통) ─────────── */
.game-screen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}
.game-screen.active { display: flex; }

/* 헤더 */
.game-header {
  display: flex; align-items: center; gap: 1rem;
  padding: 1.2rem 1.5rem;
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(12px);
  border-bottom: 2px solid rgba(255,255,255,.5);
}

.btn-back {
  background: rgba(255,255,255,.9);
  border: none; border-radius: 12px;
  width: 44px; height: 44px;
  font-size: 1.3rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.btn-back:hover { transform: scale(1.1); }

.header-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  color: #fff;
  flex: 1;
}

.score-badge {
  background: rgba(255,255,255,.25);
  color: #fff; font-weight: 800; font-size: .9rem;
  padding: 6px 14px; border-radius: 20px;
  white-space: nowrap;
}

/* 게임 바디 */
.game-body {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 2rem 1.5rem;
  gap: 1.5rem;
}

/* 공통 버튼 */
.btn-primary {
  border: none; border-radius: 18px;
  padding: 1rem 2.4rem;
  font-family: var(--font-display);
  font-size: 1.2rem;
  cursor: pointer;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
  width: 100%; max-width: 360px;
}
.btn-primary:hover  { transform: translateY(-3px) scale(1.02); }
.btn-primary:active { transform: scale(.97); }

/* 카드 공통 */
.content-card {
  background: #fff;
  border-radius: 24px;
  padding: 1.8rem;
  width: 100%; max-width: 480px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}

/* 지시문 */
.instruction {
  font-family: var(--font-display);
  font-size: 1.1rem;
  text-align: center;
  line-height: 1.5;
}

/* 진행 바 */
.progress-bar {
  width: 100%; max-width: 480px;
  height: 10px;
  background: rgba(255,255,255,.4);
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 10px;
  background: rgba(255,255,255,.9);
  transition: width .4s ease;
}

/* 피드백 팝업 */
.feedback-popup {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100; pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
}
.feedback-popup.show { opacity: 1; pointer-events: auto; }
.feedback-inner {
  background: #fff;
  border-radius: 28px;
  padding: 2rem 2.5rem;
  text-align: center;
  box-shadow: 0 16px 64px rgba(0,0,0,.2);
  transform: scale(.8);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.feedback-popup.show .feedback-inner { transform: scale(1); }
.feedback-emoji { font-size: 4rem; display: block; margin-bottom: .5rem; }
.feedback-text { font-family: var(--font-display); font-size: 1.4rem; }

/* 결과 화면 */
.result-screen {
  text-align: center;
}
.result-emoji { font-size: 5rem; display: block; margin-bottom: 1rem;
  animation: bounce 1s ease infinite; }
@keyframes bounce {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-15px) rotate(5deg); }
}
.result-title { font-family: var(--font-display); font-size: 2rem; margin-bottom: .5rem; }
.result-score { font-size: 3.5rem; font-weight: 900; margin: 1rem 0; }
.result-msg   { font-size: 1rem; color: #666; margin-bottom: 2rem; }

/* ══════════════════════════════════════════
   🚂 색깔 기차 게임
══════════════════════════════════════════ */
#screen-train .game-header { background: var(--train-primary); }

.train-track {
  display: flex; align-items: center; gap: .5rem;
  flex-wrap: wrap; justify-content: center;
  margin: 1rem 0;
}

.train-car {
  width: 72px; height: 72px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  border: 3px solid rgba(0,0,0,.08);
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  position: relative;
  cursor: default;
}
.train-car.revealed {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(0,0,0,.15);
}
.train-car.hidden {
  background: #E8E8E8 !important;
  font-size: 1.5rem;
}
.train-car::after {
  content: '';
  position: absolute; bottom: -8px; left: 10px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #555;
}
.train-car::before {
  content: '';
  position: absolute; bottom: -8px; right: 10px;
  width: 14px; height: 14px; border-radius: 50%;
  background: #555;
}

.train-connector {
  width: 20px; height: 4px;
  background: #aaa; border-radius: 2px;
  flex-shrink: 0;
}

/* 색깔 선택 버튼 */
.color-choices {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: .8rem; width: 100%; max-width: 400px;
}
.color-btn {
  border: none; border-radius: 16px;
  padding: .9rem .5rem;
  font-family: var(--font-display); font-size: 1rem;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
  color: #fff; font-weight: 700;
  box-shadow: 0 4px 12px rgba(0,0,0,.12);
}
.color-btn:hover  { transform: scale(1.08); }
.color-btn:active { transform: scale(.95); }
.color-btn span   { font-size: 1.5rem; }

/* ══════════════════════════════════════════
   🐾 동물 분류 게임
══════════════════════════════════════════ */
#screen-animal .game-header { background: var(--animal-primary); }

.animal-card {
  text-align: center;
  padding: 2rem;
}
.animal-emoji-big {
  font-size: 5rem; display: block; margin-bottom: .8rem;
  animation: wiggle 2s ease-in-out infinite;
}
@keyframes wiggle {
  0%,100% { transform: rotate(-5deg); }
  50%      { transform: rotate(5deg); }
}
.animal-name   { font-family: var(--font-display); font-size: 1.6rem; margin-bottom: .3rem; }
.animal-sound  { font-size: .9rem; color: #888; margin-bottom: .5rem; }
.animal-hint   { font-size: .85rem; color: var(--animal-secondary); font-weight: 700; }

.home-choices {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: .8rem; width: 100%; max-width: 480px;
}
.home-btn {
  border: none; border-radius: 18px;
  padding: 1.1rem .5rem;
  font-family: var(--font-display); font-size: 1rem;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
}
.home-btn:hover  { transform: scale(1.08) rotate(-2deg); }
.home-btn:active { transform: scale(.95); }
.home-btn .hb-emoji { font-size: 2rem; }
.home-btn .hb-label { font-size: .95rem; font-weight: 800; }

.btn-sea   { background: #118AB2; color: #fff; }
.btn-land  { background: #06D6A0; color: #fff; }
.btn-sky   { background: #FFD166; color: #073B4C; }

/* 재미있는 사실 팝업 */
.fact-bubble {
  background: linear-gradient(135deg, #E8F9F4, #D1F4EA);
  border: 2px solid var(--animal-primary);
  border-radius: 18px; padding: 1rem 1.2rem;
  font-size: .9rem; color: #073B4C; font-weight: 600;
  max-width: 400px; text-align: center;
  transition: all .3s; display: none;
}
.fact-bubble.show { display: block; }

/* ══════════════════════════════════════════
   🥁 박자 게임
══════════════════════════════════════════ */
#screen-rhythm .game-header { background: var(--rhythm-primary); }

.rhythm-display {
  display: flex; flex-wrap: wrap;
  gap: .6rem; justify-content: center;
  min-height: 80px; align-items: center;
  padding: 1rem;
}

.beat-chip {
  border-radius: 14px;
  padding: .6rem 1rem;
  font-family: var(--font-display); font-size: 1rem;
  color: #fff; font-weight: 700;
  animation: chipPop .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes chipPop {
  from { transform: scale(0) rotate(-10deg); opacity: 0; }
  to   { transform: scale(1) rotate(0deg);   opacity: 1; }
}

.beat-choices {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: .7rem; width: 100%; max-width: 420px;
}
.beat-btn {
  border: 3px solid transparent;
  border-radius: 16px; padding: .9rem .4rem;
  font-family: var(--font-display); font-size: .95rem;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: #fff;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), border-color .15s;
  box-shadow: 0 3px 12px rgba(0,0,0,.1);
  color: var(--dark);
}
.beat-btn:hover  { transform: scale(1.08); border-color: var(--rhythm-primary); }
.beat-btn:active { transform: scale(.95); }
.beat-btn .beat-icon { font-size: 1.6rem; }

/* ══════════════════════════════════════════
   🧺 과일 바구니 게임
══════════════════════════════════════════ */
#screen-fruit .game-header { background: var(--fruit-primary); }

.fruit-items {
  display: flex; flex-wrap: wrap;
  gap: .8rem; justify-content: center;
  width: 100%; max-width: 400px;
}

.fruit-item {
  background: #fff;
  border-radius: 18px;
  padding: 1rem 1.2rem;
  text-align: center;
  box-shadow: 0 3px 12px rgba(0,0,0,.1);
  transition: all .2s;
  min-width: 90px;
}
.fruit-item.sorted {
  opacity: .4; transform: scale(.9);
}
.fruit-emoji-lg { font-size: 2.2rem; display: block; }
.fruit-count    {
  font-family: var(--font-display); font-size: 1.3rem;
  color: var(--fruit-primary); font-weight: 900;
}
.fruit-dots {
  display: flex; flex-wrap: wrap; gap: 3px;
  justify-content: center; margin-top: 4px;
  max-width: 60px;
}
.fruit-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--fruit-secondary);
}

.sort-prompt {
  font-family: var(--font-display); font-size: 1rem;
  text-align: center; color: var(--dark);
}

.fruit-order-btns {
  display: flex; flex-wrap: wrap;
  gap: .6rem; justify-content: center;
  width: 100%; max-width: 400px;
}
.fruit-order-btn {
  border: 3px solid #e0e0e0;
  border-radius: 14px; padding: .7rem 1rem;
  font-family: var(--font-display); font-size: 1rem;
  cursor: pointer; background: #fff;
  transition: all .15s cubic-bezier(.34,1.56,.64,1);
  display: flex; align-items: center; gap: 6px;
}
.fruit-order-btn:hover { transform: scale(1.08); border-color: var(--fruit-primary); }
.fruit-order-btn.selected {
  background: var(--fruit-primary); color: #fff;
  border-color: var(--fruit-primary);
  transform: scale(1.05);
}
.fruit-order-btn:active { transform: scale(.95); }

/* ─────────── 반짝이 파티클 ─────────── */
.particle {
  position: fixed;
  pointer-events: none;
  border-radius: 50%;
  animation: particle-fall 1s ease-out forwards;
  z-index: 200;
}
@keyframes particle-fall {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(120px) scale(0.3); }
}

/* ─────────── 반응형 ─────────── */
@media (max-width: 380px) {
  .game-grid { grid-template-columns: 1fr 1fr; gap: .8rem; }
  .game-card  { padding: 1.2rem 1rem; }
  .card-emoji { font-size: 2.2rem; }
  .card-title { font-size: 1.05rem; }
}
</style>
</head>
<body>
<div id="app">

<!-- ══════════════════ 홈 화면 ══════════════════ -->
<div id="home-screen">
  <h1 class="home-title">
    <span>🌟</span><span>두뇌</span><span>게임</span>
  </h1>
  <p class="home-subtitle">영유아 뇌발달 교육 게임 🧠</p>

  <div class="game-grid">
    <div class="game-card card-train" onclick="startGame('train')">
      <span class="card-badge">순서·기억</span>
      <span class="card-emoji">🚂</span>
      <div class="card-title">색깔 기차</div>
      <div class="card-desc">색깔 순서를 기억하세요!</div>
    </div>
    <div class="game-card card-animal" onclick="startGame('animal')">
      <span class="card-badge">분류·언어</span>
      <span class="card-emoji">🐾</span>
      <div class="card-title">동물 나라</div>
      <div class="card-desc">동물이 사는 곳은?</div>
    </div>
    <div class="game-card card-rhythm" onclick="startGame('rhythm')">
      <span class="card-badge">리듬·청각</span>
      <span class="card-emoji">🥁</span>
      <div class="card-title">박자 놀이</div>
      <div class="card-desc">박자를 따라하세요!</div>
    </div>
    <div class="game-card card-fruit" onclick="startGame('fruit')">
      <span class="card-badge">수 감각</span>
      <span class="card-emoji">🧺</span>
      <div class="card-title">과일 바구니</div>
      <div class="card-desc">순서대로 담으세요!</div>
    </div>
  </div>
</div>

<!-- ══════════════════ 🚂 색깔 기차 ══════════════════ -->
<div id="screen-train" class="game-screen">
  <div class="game-header">
    <button class="btn-back" onclick="goHome()">←</button>
    <div class="header-title">🚂 색깔 기차</div>
    <div class="score-badge" id="train-score-badge">⭐ 0</div>
  </div>
  <div class="game-body">
    <div class="progress-bar"><div class="progress-fill" id="train-progress" style="width:0%"></div></div>

    <div class="content-card">
      <div class="instruction" id="train-instruction">기차 색깔 순서를 기억하세요!</div>
      <div class="train-track" id="train-track"></div>
    </div>

    <div class="color-choices" id="train-choices" style="display:none"></div>

    <button class="btn-primary" id="train-btn"
      style="background:var(--train-primary);color:#fff"
      onclick="trainAction()">기차 출발! 🚂</button>
  </div>
</div>

<!-- ══════════════════ 🐾 동물 분류 ══════════════════ -->
<div id="screen-animal" class="game-screen">
  <div class="game-header">
    <button class="btn-back" onclick="goHome()">←</button>
    <div class="header-title">🐾 동물 나라</div>

<div class="feedback-popup" id="feedback-popup">

  </div>

<script>
/* ══════════════════════════════════════════
   🔧 공통 유틸
══════════════════════════════════════════ */
function shuffle(arr) {
  return [...arr].sort(() => Math.random() - .5);
}

function goHome() {
  document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
  document.getElementById('home-screen').style.display = 'flex';
}

function startGame(id) {
  document.getElementById('home-screen').style.display = 'none';
  document.querySelectorAll('.game-screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  const inits = { train: initTrain, animal: initAnimal, rhythm: initRhythm, fruit: initFruit };
  inits[id]();
}

function showFeedback(correct, msg = '') {
  const popup = document.getElementById('feedback-popup');
  document.getElementById('feedback-emoji').textContent = correct ? ['🎉','⭐','🌟','✨','👏'][Math.floor(Math.random()*5)] : '😅';
  document.getElementById('feedback-text').textContent = correct ? (msg || '정답이에요!') : (msg || '아쉬워요!');
  popup.classList.add('show');
  spawnParticles(correct);
  setTimeout(() => popup.classList.remove('show'), 1200);
}

function spawnParticles(correct) {
  if (!correct) return;
  const colors = ['#FF4D4D','#FFD93D','#06D6A0','#118AB2','#FF6B35','#7B2D8B','#F9C74F'];
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      width:${8+Math.random()*10}px;
      height:${8+Math.random()*10}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:${20+Math.random()*60}vw;
      top:${20+Math.random()*40}vh;
      animation-delay:${Math.random()*.4}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1200);
  }
}

/* ══════════════════════════════════════════
   🚂 색깔 기차 (deque / Queue)
══════════════════════════════════════════ */
const TRAIN_COLORS = [
  { name:'빨강', emoji:'🔴', hex:'#FF4D4D' },
  { name:'파랑', emoji:'🔵', hex:'#4D79FF' },
  { name:'노랑', emoji:'🟡', hex:'#FFD93D' },
  { name:'초록', emoji:'🟢', hex:'#06D6A0' },
  { name:'분홍', emoji:'🩷', hex:'#FF6B9D' },
];

let trainState = {};

function initTrain() {
  trainState = { round:0, totalRounds:4, score:0, phase:'start', sequence:[], queueIdx:0 };
  updateTrainUI();
  document.getElementById('train-instruction').textContent = '기차 색깔 순서를 기억하세요!';
  document.getElementById('train-btn').textContent = '기차 출발! 🚂';
  document.getElementById('train-choices').style.display = 'none';
  document.getElementById('train-btn').style.display = 'block';
  renderTrainTrack([], false);
}

function renderTrainTrack(seq, hidden) {
  const track = document.getElementById('train-track');
  track.innerHTML = '';
  seq.forEach((c, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'train-connector';
      track.appendChild(conn);
    }
    const car = document.createElement('div');
    car.className = 'train-car' + (hidden ? ' hidden' : ' revealed');
    car.style.background = hidden ? '#E8E8E8' : c.hex;
    car.textContent = hidden ? '❓' : c.emoji;
    track.appendChild(car);
  });
}

function updateTrainUI() {
  document.getElementById('train-score-badge').textContent = '⭐ ' + trainState.score;
  const pct = (trainState.round / trainState.totalRounds) * 100;
  document.getElementById('train-progress').style.width = pct + '%';
}

function trainAction() {
  if (trainState.phase === 'start' || trainState.phase === 'next') {
    if (trainState.round >= trainState.totalRounds) { showTrainResult(); return; }
    trainState.round++;
    trainState.queueIdx = 0;

    const len = 2 + Math.min(trainState.round, 3); // 3~5칸 점진 증가
    trainState.sequence = Array.from({length: len}, () =>
      TRAIN_COLORS[Math.floor(Math.random() * TRAIN_COLORS.length)]
    );
    trainState.phase = 'show';
    document.getElementById('train-instruction').textContent = '🚂 기차가 지나가요! 잘 봐요!';
    document.getElementById('train-btn').style.display = 'none';
    renderTrainTrack(trainState.sequence, false);

    // 3초 후 숨기기
    setTimeout(() => {
      renderTrainTrack(trainState.sequence, true);
      trainState.phase = 'answer';
      document.getElementById('train-instruction').textContent =
        `1번 칸 색깔은 뭐였을까요? (${trainState.queueIdx+1}/${trainState.sequence.length})`;
      renderColorChoices();
    }, 3000);
  }
}

function renderColorChoices() {
  const choices = document.getElementById('train-choices');
  choices.style.display = 'grid';
  choices.innerHTML = '';
  shuffle(TRAIN_COLORS).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn';
    btn.style.background = c.hex;
    btn.innerHTML = `<span>${c.emoji}</span>${c.name}`;
    btn.onclick = () => trainAnswer(c);
    choices.appendChild(btn);
  });
}

function trainAnswer(chosen) {
  if (trainState.phase !== 'answer') return;
  // dequeue: 순서대로(FIFO) 정답 꺼내기
  const expected = trainState.sequence[trainState.queueIdx];
  const correct = chosen.name === expected.name;
  if (correct) {
    trainState.score++;
    showFeedback(true, '맞아요! 🎉');
  } else {
    showFeedback(false, `${expected.emoji} ${expected.name}이에요!`);
  }
  updateTrainUI();

  // 맞은 칸 강조
  const cars = document.querySelectorAll('.train-car');
  if (cars[trainState.queueIdx]) {
    cars[trainState.queueIdx].style.background = expected.hex;
    cars[trainState.queueIdx].textContent = expected.emoji;
    cars[trainState.queueIdx].classList.remove('hidden');
    cars[trainState.queueIdx].classList.add('revealed');
  }

  trainState.queueIdx++; // dequeue 포인터 이동
  setTimeout(() => {
    if (trainState.queueIdx < trainState.sequence.length) {
      document.getElementById('train-instruction').textContent =
        `${trainState.queueIdx+1}번 칸 색깔은? (${trainState.queueIdx+1}/${trainState.sequence.length})`;
    } else {
      document.getElementById('train-choices').style.display = 'none';
      document.getElementById('train-btn').style.display = 'block';
      if (trainState.round >= trainState.totalRounds) {
        document.getElementById('train-btn').textContent = '결과 보기! 🏆';
      } else {
        document.getElementById('train-btn').textContent = `다음 기차! 🚂 (${trainState.round}/${trainState.totalRounds})`;
      }
      trainState.phase = 'next';
      document.getElementById('train-instruction').textContent = correct ? '모두 맞췄어요! 대단해요! 🌟' : '다음엔 더 잘할 수 있어요!';
    }
  }, 1300);
}

function showTrainResult() {
  const body = document.querySelector('#screen-train .game-body');
  body.innerHTML = `
    <div class="result-screen content-card">
      <span class="result-emoji">🚂</span>
      <div class="result-title">기차 완주!</div>
      <div class="result-score" style="color:var(--train-primary)">${trainState.score}점</div>
      <div class="result-msg">${trainState.score >= trainState.totalRounds * 3 ? '완벽해요! 천재 친구!' : '정말 잘했어요! 🎉'}</div>
      <button class="btn-primary" style="background:var(--train-primary);color:#fff" onclick="initTrain()">다시 하기 🔄</button>
      <br><br>
      <button class="btn-primary" style="background:#eee;color:#333;margin-top:.5rem" onclick="goHome()">홈으로 🏠</button>
    </div>`;
}

/* ══════════════════════════════════════════
   🐾 동물 분류 (dict + Queue)
══════════════════════════════════════════ */
const ANIMALS = [
  { emoji:'🐬', name:'돌고래', home:'바다', sound:'끼익끼익~', fact:'물속에서 숨을 참을 수 있어요!' },
  { emoji:'🦁', name:'사자',   home:'육지', sound:'으르렁~',   fact:'100마리 무리를 프라이드라고 해요!' },
  { emoji:'🦅', name:'독수리', home:'하늘', sound:'끼욱끼욱~', fact:'4km 밖에서도 먹이를 볼 수 있어요!' },
  { emoji:'🐠', name:'물고기', home:'바다', sound:'...조용해요',fact:'아가미로 물속 산소를 마셔요!' },
  { emoji:'🐘', name:'코끼리', home:'육지', sound:'뿌웅~',     fact:'코로 물을 마시고 샤워도 해요!' },
  { emoji:'🦜', name:'앵무새', home:'하늘', sound:'안녕! 안녕!',fact:'사람 말을 따라 할 수 있어요!' },
  { emoji:'🦈', name:'상어',   home:'바다', sound:'...무서워요',fact:'이빨이 빠지면 새로 자라요!' },
  { emoji:'🦊', name:'여우',   home:'육지', sound:'캥캥~',    fact:'꼬리로 균형을 잡아요!' },
  { emoji:'🦋', name:'나비',   home:'하늘', sound:'...날개짓',  fact:'발로 맛을 느낄 수 있어요!' },
];

let animalState = {};

function initAnimal() {
  animalState = { queue: shuffle(ANIMALS), idx:0, score:0, waiting:false };
  showNextAnimal();
  document.getElementById('animal-choices').style.display = 'grid';
  document.getElementById('fact-bubble').classList.remove('show');
}

function showNextAnimal() {
  if (animalState.idx >= animalState.queue.length) { showAnimalResult(); return; }
  const a = animalState.queue[animalState.idx]; // peek from queue
  document.getElementById('animal-emoji').textContent = a.emoji;
  document.getElementById('animal-name').textContent  = a.name;
  document.getElementById('animal-sound').textContent = `"${a.sound}"`;
  document.getElementById('animal-instruction').textContent = '이 동물이 사는 곳은?';
  document.getElementById('fact-bubble').classList.remove('show');
  const pct = (animalState.idx / animalState.queue.length) * 100;
  document.getElementById('animal-progress').style.width = pct + '%';
  document.getElementById('animal-score-badge').textContent = '⭐ ' + animalState.score;
}

function animalAnswer(answer) {
  if (animalState.waiting) return;
  const a = animalState.queue[animalState.idx]; // dequeue pointer
  const correct = answer === a.home;
  if (correct) { animalState.score++; showFeedback(true); }
  else { showFeedback(false, `${a.emoji}는 ${a.home}에 살아요!`); }
  // 재미있는 사실 표시
  const fact = document.getElementById('fact-bubble');
  fact.textContent = '📚 ' + a.fact;
  fact.classList.add('show');
  animalState.waiting = true;
  animalState.idx++; // dequeue
  setTimeout(() => {
    animalState.waiting = false;
    showNextAnimal();
  }, 2000);
}

function showAnimalResult() {
  const body = document.querySelector('#screen-animal .game-body');
  const total = animalState.queue.length;
  body.innerHTML = `
    <div class="result-screen content-card">
      <span class="result-emoji">🐾</span>
      <div class="result-title">동물 박사!</div>
      <div class="result-score" style="color:var(--animal-primary)">${animalState.score}/${total}점</div>
      <div class="result-msg">${animalState.score === total ? '완벽해요! 동물 천재!' : '잘 했어요! 더 알아봐요! 🐾'}</div>
      <button class="btn-primary" style="background:var(--animal-primary);color:#fff" onclick="initAnimal()">다시 하기 🔄</button>
      <br><br>
      <button class="btn-primary" style="background:#eee;color:#333;margin-top:.5rem" onclick="goHome()">홈으로 🏠</button>
    </div>`;
}

/* ══════════════════════════════════════════
   🥁 박자 놀이 (Stack + Queue)
══════════════════════════════════════════ */
const BEATS = [
  { id:'kung',    label:'쿵',   icon:'🥁', color:'#FF6B35' },
  { id:'chak',    label:'짝',   icon:'👏', color:'#FFD93D' },
  { id:'kungkung',label:'쿵쿵', icon:'🥁🥁',color:'#FF4D4D' },
  { id:'chakchak',label:'짝짝', icon:'👏👏',color:'#06D6A0' },
  { id:'kungchak',label:'쿵짝', icon:'🥁👏',color:'#118AB2' },
];

let rhythmState = {};

function initRhythm() {
  // stack: 점점 쌓이는 패턴 구조
  rhythmState = {
    stack:[], beatQueue: shuffle(BEATS),
    queuePtr:0, answerIdx:0,
    level:0, maxLevel:5, score:0, phase:'start'
  };
  document.getElementById('rhythm-instruction').textContent = '박자를 잘 보세요!';
  document.getElementById('rhythm-display').innerHTML = '';
  document.getElementById('beat-choices').style.display = 'none';
  document.getElementById('rhythm-sub').style.display = 'none';
  document.getElementById('rhythm-btn').style.display = 'block';
  document.getElementById('rhythm-btn').textContent = '시작! 🥁';
  updateRhythmUI();
}

function updateRhythmUI() {
  document.getElementById('rhythm-score-badge').textContent = '⭐ ' + rhythmState.score;
  const pct = (rhythmState.level / rhythmState.maxLevel) * 100;
  document.getElementById('rhythm-progress').style.width = pct + '%';
}

function rhythmAction() {
  if (rhythmState.level >= rhythmState.maxLevel) { showRhythmResult(); return; }
  rhythmState.level++;
  rhythmState.answerIdx = 0;

  // 큐에서 새 박자 꺼내 스택에 push
  const newBeat = rhythmState.beatQueue[rhythmState.queuePtr % rhythmState.beatQueue.length];
  rhythmState.queuePtr++;
  rhythmState.stack.push(newBeat); // push onto stack

  // 패턴 보여주기
  renderRhythmPattern(true);
  document.getElementById('rhythm-instruction').textContent = `레벨 ${rhythmState.level} — 잘 봐요!`;
  document.getElementById('rhythm-btn').style.display = 'none';
  document.getElementById('beat-choices').style.display = 'none';
  document.getElementById('rhythm-sub').style.display = 'none';

  // 1.5초 후 입력 받기
  setTimeout(() => {
    document.getElementById('rhythm-display').innerHTML = '';
    document.getElementById('rhythm-instruction').textContent = '순서대로 눌러요!';
    document.getElementById('rhythm-sub').style.display = 'block';
    renderBeatChoices();
  }, 1800);
}

function renderRhythmPattern(show) {
  const disp = document.getElementById('rhythm-display');
  disp.innerHTML = '';
  // 스택의 bottom → top 순서로 표시 (입력 순서 = 기억 순서)
  rhythmState.stack.forEach((b, i) => {
    const chip = document.createElement('div');
    chip.className = 'beat-chip';
    chip.style.background = b.color;
    chip.style.animationDelay = (i * .15) + 's';
    chip.innerHTML = `${b.icon} ${b.label}`;
    disp.appendChild(chip);
  });
}

function renderBeatChoices() {
  const choices = document.getElementById('beat-choices');
  choices.style.display = 'grid';
  choices.innerHTML = '';
  shuffle(BEATS).forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'beat-btn';
    btn.innerHTML = `<span class="beat-icon">${b.icon}</span>${b.label}`;
    btn.onclick = () => rhythmAnswer(b);
    choices.appendChild(btn);
  });
}

function rhythmAnswer(chosen) {
  const expected = rhythmState.stack[rhythmState.answerIdx]; // 스택 순서로 확인
  const correct = chosen.id === expected.id;
  if (correct) {
    // 맞은 박자 표시
    const chips = document.querySelectorAll('.beat-chip');
    if (chips[rhythmState.answerIdx]) {
      chips[rhythmState.answerIdx].style.boxShadow = '0 0 0 3px #fff, 0 0 0 5px ' + expected.color;
    }
    rhythmState.answerIdx++;
    if (rhythmState.answerIdx >= rhythmState.stack.length) {
      rhythmState.score++;
      showFeedback(true, '완벽해요! 🎵');
      updateRhythmUI();
      document.getElementById('beat-choices').style.display = 'none';
      document.getElementById('rhythm-sub').style.display = 'none';
      document.getElementById('rhythm-btn').style.display = 'block';
      document.getElementById('rhythm-btn').textContent =
        rhythmState.level >= rhythmState.maxLevel ? '결과 보기! 🏆' : `다음 레벨! 🥁 (${rhythmState.level}/${rhythmState.maxLevel})`;
      renderRhythmPattern(true);
    } else {
      showFeedback(true, '계속!');
    }
  } else {
    showFeedback(false, `${expected.icon} ${expected.label}이에요!`);
    updateRhythmUI();
    setTimeout(() => {
      document.getElementById('beat-choices').style.display = 'none';
      document.getElementById('rhythm-sub').style.display = 'none';
      document.getElementById('rhythm-btn').style.display = 'block';
      document.getElementById('rhythm-btn').textContent =
        rhythmState.level >= rhythmState.maxLevel ? '결과 보기! 🏆' : `다음 레벨! 🥁 (${rhythmState.level}/${rhythmState.maxLevel})`;
      renderRhythmPattern(true);
    }, 1300);
  }
}

function showRhythmResult() {
  const body = document.querySelector('#screen-rhythm .game-body');
  body.innerHTML = `
    <div class="result-screen content-card">
      <span class="result-emoji">🥁</span>
      <div class="result-title">리듬 마스터!</div>
      <div class="result-score" style="color:var(--rhythm-primary)">${rhythmState.score}/${rhythmState.maxLevel}점</div>
      <div class="result-msg">${rhythmState.score >= 4 ? '리듬 천재예요! 🎵' : '멋진 도전이었어요!'}</div>
      <button class="btn-primary" style="background:var(--rhythm-primary);color:#fff" onclick="initRhythm()">다시 하기 🔄</button>
      <br><br>
      <button class="btn-primary" style="background:#eee;color:#333;margin-top:.5rem" onclick="goHome()">홈으로 🏠</button>
    </div>`;
}

/* ══════════════════════════════════════════
   🧺 과일 바구니 (heapq / Priority Queue)
══════════════════════════════════════════ */
const FRUITS_DATA = ['🍎','🍌','🍊','🍇','🍓','🫐','🍑','🥭'];

let fruitState = {};

function initFruit() {
  fruitState = { round:0, totalRounds:4, score:0, phase:'start', items:[], sorted:[], clickOrder:[] };
  document.getElementById('fruit-instruction').textContent = '과일이 몇 개인지 세어봐요!';
  document.getElementById('fruit-btn').textContent = '시작! 🧺';
  document.getElementById('fruit-btn').style.display = 'block';
  document.getElementById('fruit-items').innerHTML = '';
  document.getElementById('fruit-order-btns').style.display = 'none';
  document.getElementById('sort-prompt').style.display = 'none';
  updateFruitUI();
}

function updateFruitUI() {
  document.getElementById('fruit-score-badge').textContent = '⭐ ' + fruitState.score;
  const pct = (fruitState.round / fruitState.totalRounds) * 100;
  document.getElementById('fruit-progress').style.width = pct + '%';
}

function fruitAction() {
  if (fruitState.phase === 'result' || fruitState.round >= fruitState.totalRounds) {
    showFruitResult(); return;
  }
  fruitState.round++;
  fruitState.phase = 'sort';
  fruitState.clickOrder = [];

  // 3개 과일 랜덤 (최소힙 정렬 원리: 개수 기준)
  const fruits = shuffle(FRUITS_DATA).slice(0,3);
  fruitState.items = fruits.map(f => ({
    emoji: f,
    count: 1 + Math.floor(Math.random() * 5)
  }));
  // 정답: 오름차순 정렬 (heapq 원리)
  fruitState.sorted = [...fruitState.items].sort((a,b) => a.count - b.count);

  // 과일 표시
  renderFruitItems();
  document.getElementById('fruit-instruction').textContent = `라운드 ${fruitState.round}: 과일을 세어봐요!`;

  setTimeout(() => {
    document.getElementById('sort-prompt').style.display = 'block';
    renderFruitOrderBtns();
    document.getElementById('fruit-btn').style.display = 'none';
  }, 1000);
}

function renderFruitItems() {
  const container = document.getElementById('fruit-items');
  container.innerHTML = '';
  fruitState.items.forEach((item, i) => {
    const el = document.createElement('div');
    el.className = 'fruit-item';
    el.id = 'fruit-item-' + i;
    // 점(dot)으로 개수 시각화
    const dots = Array(item.count).fill('<div class="fruit-dot"></div>').join('');
    el.innerHTML = `
      <span class="fruit-emoji-lg">${item.emoji}</span>
      <div class="fruit-count">${item.count}개</div>
      <div class="fruit-dots">${dots}</div>
    `;
    container.appendChild(el);
  });
}

function renderFruitOrderBtns() {
  const btns = document.getElementById('fruit-order-btns');
  btns.style.display = 'flex';
  btns.innerHTML = '';
  // 섞인 순서로 버튼 표시
  shuffle(fruitState.items).forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'fruit-order-btn';
    btn.dataset.count = item.count;
    btn.dataset.emoji = item.emoji;
    btn.innerHTML = `${item.emoji} <strong>${item.count}</strong>개`;
    btn.onclick = () => fruitOrderClick(btn, item);
    btns.appendChild(btn);
  });
}

function fruitOrderClick(btn, item) {
  if (btn.classList.contains('selected')) return;
  const expectedOrder = fruitState.sorted[fruitState.clickOrder.length];

  if (item.count === expectedOrder.count && item.emoji === expectedOrder.emoji) {
    btn.classList.add('selected');
    fruitState.clickOrder.push(item);
    showFeedback(true);

    // 해당 과일 카드 페이드
    const idx = fruitState.items.findIndex(x => x.emoji === item.emoji && x.count === item.count);
    const card = document.getElementById('fruit-item-' + idx);
    if (card) card.classList.add('sorted');

    if (fruitState.clickOrder.length === fruitState.sorted.length) {
      fruitState.score++;
      updateFruitUI();
      setTimeout(() => {
        document.getElementById('fruit-order-btns').style.display = 'none';
        document.getElementById('sort-prompt').style.display = 'none';
        document.getElementById('fruit-btn').style.display = 'block';
        document.getElementById('fruit-btn').textContent =
          fruitState.round >= fruitState.totalRounds ? '결과 보기! 🏆' : `다음 과일! 🧺 (${fruitState.round}/${fruitState.totalRounds})`;
        document.getElementById('fruit-instruction').textContent = '완벽해요! 🌟';
        fruitState.phase = fruitState.round >= fruitState.totalRounds ? 'result' : 'start';
      }, 1000);
    }
  } else {
    showFeedback(false, `${expectedOrder.emoji} ${expectedOrder.count}개가 더 적어요!`);
  }
}

function showFruitResult() {
  const body = document.querySelector('#screen-fruit .game-body');
  body.innerHTML = `
    <div class="result-screen content-card">
      <span class="result-emoji">🧺</span>
      <div class="result-title">숫자 박사!</div>
      <div class="result-score" style="color:var(--fruit-primary)">${fruitState.score}/${fruitState.totalRounds}점</div>
      <div class="result-msg">${fruitState.score === fruitState.totalRounds ? '완벽 정렬! 수학 천재!' : '잘 했어요! 숫자 감각이 쑥쑥!'}</div>
      <button class="btn-primary" style="background:var(--fruit-primary);color:#fff" onclick="initFruit()">다시 하기 🔄</button>
      <br><br>
      <button class="btn-primary" style="background:#eee;color:#333;margin-top:.5rem" onclick="goHome()">홈으로 🏠</button>
    </div>`;
}
</script>
</body>
</html>
