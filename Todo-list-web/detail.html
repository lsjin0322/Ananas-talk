<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO 작성페이지</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="phone-container detail-page-container">
        <header class="detail-header">
            <button class="back-btn" onclick="location.href='index.html'"></button>
            <button class="top-delete-btn" id="delete-btn">삭제</button>
        </header>
        <div class="detail-main-char-zone">
            <div class="full-banner-zone">
                <img src="./images/pf.png" alt="캐릭터" class="profile-img">
            </div>
            <input type="text" id="detail-task-title-input" class="detail-title-editable" value="오늘의 할일">
        </div>
        <div class="info-card">
            <div class="info-card-left">
                <img src="./images/day.png" alt="달력" class="custom-calendar-img">
                <div class="date-text-block">
                    <div class="info-label">기한 설정</div>
                    <div class="date-input-wrapper">
                        <input type="date" id="visible-date-input" class="visible-date-picker">
                    </div>
                </div>
            </div>
        </div>
        <div class="memo-container">
            <div class="memo-header">
                <span>🌸</span> <strong>메모</strong>
            </div>
            <textarea class="memo-textarea" id="memo-input" rows="3" placeholder="메모 내용을 기입해 주세요."></textarea>
        </div>
        <div class="setting-section">
            <label class="section-title">중요도</label>
            <div class="chip-group" id="importance-group">
                <button class="chip-btn" data-level="low">낮음</button>
                <button class="chip-btn" data-level="normal">보통</button>
                <button class="chip-btn" data-level="high">높음</button>
            </div>
        </div>
        <div class="setting-section">
            <label class="section-title">상태</label>
            <div class="status-group" id="status-group">
                <button class="status-btn" data-status="complete">😊 완료</button>
                <button class="status-btn" data-status="progress">😐 진행중</button>
            </div>
        </div>
        <button class="save-btn" id="save-btn">저장하기</button>
        <nav class="bottom-nav">
            <button class="nav-item" onclick="location.href='index.html'" title="홈">🏠</button>
            <button class="nav-item active" onclick="location.href='detail.html'" title="세부 일정 관리">📋</button>
            <button class="nav-item" onclick="location.href='settings.html'" title="설정">⚙️</button>
        </nav>
    </div>
    <script src="detail-script.js"></script>
</body>
</html>
