<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" width="680" role="img" aria-label="응답시간 P95 P99">
  <title>Ananas Talk — 응답시간 P95/P99</title>
  <rect width="680" height="280" fill="#0d1117" rx="12"/>
  <text x="32" y="36" font-family="sans-serif" font-size="13" fill="#8b949e">응답시간 P95 · P99  (ms)  |  2025.07 실측</text>

  <rect x="32" y="48" width="10" height="10" fill="#1f6feb" rx="2"/>
  <text x="46" y="57" font-family="sans-serif" font-size="11" fill="#8b949e">P95</text>
  <rect x="80" y="48" width="10" height="10" fill="#da3633" rx="2"/>
  <text x="94" y="57" font-family="sans-serif" font-size="11" fill="#8b949e">P99</text>

  <line x1="80" y1="220" x2="640" y2="220" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="180" x2="640" y2="180" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="140" x2="640" y2="140" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="100" x2="640" y2="100" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="70"  x2="640" y2="70"  stroke="#21262d" stroke-width="1"/>
  <text x="68" y="224" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">0ms</text>
  <text x="68" y="184" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">20ms</text>
  <text x="68" y="144" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">40ms</text>
  <text x="68" y="104" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">60ms</text>
  <text x="68" y="74"  font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">80ms</text>

  <!-- 10 concurrent: P95=13ms, P99=17ms -->
  <rect x="115" y="220" width="50" height="0" fill="#1f6feb" rx="3">
    <animate attributeName="height" from="0" to="24" dur="0.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="196" dur="0.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <rect x="170" y="220" width="50" height="0" fill="#da3633" rx="3">
    <animate attributeName="height" from="0" to="32" dur="0.6s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="188" dur="0.6s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="140" y="188" font-family="sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle" opacity="0">13ms<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.75s" fill="freeze"/></text>
  <text x="195" y="180" font-family="sans-serif" font-size="10" fill="#f85149" text-anchor="middle" opacity="0">17ms<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.9s" fill="freeze"/></text>
  <text x="155" y="244" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">10 concurrent</text>

  <!-- 50 concurrent: P95=37ms, P99=48ms -->
  <rect x="295" y="220" width="50" height="0" fill="#1f6feb" rx="3">
    <animate attributeName="height" from="0" to="69" dur="0.6s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="151" dur="0.6s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <rect x="350" y="220" width="50" height="0" fill="#da3633" rx="3">
    <animate attributeName="height" from="0" to="90" dur="0.6s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="130" dur="0.6s" begin="0.65s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="320" y="143" font-family="sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle" opacity="0">37ms<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.05s" fill="freeze"/></text>
  <text x="375" y="122" font-family="sans-serif" font-size="10" fill="#f85149" text-anchor="middle" opacity="0">48ms<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.2s" fill="freeze"/></text>
  <text x="335" y="244" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">50 concurrent</text>

  <!-- 100 concurrent: P95=77ms, P99=83ms -->
  <rect x="475" y="220" width="50" height="0" fill="#1f6feb" rx="3">
    <animate attributeName="height" from="0" to="144" dur="0.6s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="76" dur="0.6s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <rect x="530" y="220" width="50" height="0" fill="#da3633" rx="3">
    <animate attributeName="height" from="0" to="155" dur="0.6s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="65" dur="0.6s" begin="0.95s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="500" y="68" font-family="sans-serif" font-size="10" fill="#58a6ff" text-anchor="middle" opacity="0">77ms<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.35s" fill="freeze"/></text>
  <text x="555" y="57" font-family="sans-serif" font-size="10" fill="#f85149" text-anchor="middle" opacity="0">83ms<animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.5s" fill="freeze"/></text>
  <text x="515" y="244" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100 concurrent</text>

  <text x="640" y="272" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="end">Node.js v24 / Windows 11 / perf_test.js</text>
</svg>
