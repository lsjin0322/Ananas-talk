<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" width="680" role="img" aria-label="RPS 부하 테스트 차트">
  <title>Ananas Talk — 부하 테스트 RPS</title>
  <rect width="680" height="280" fill="#0d1117" rx="12"/>
  <text x="32" y="36" font-family="sans-serif" font-size="13" fill="#8b949e">부하 테스트 — 동시접속별 RPS  |  실패율 전 구간 0%  |  2025.07</text>
  <line x1="80" y1="220" x2="640" y2="220" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="170" x2="640" y2="170" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="120" x2="640" y2="120" stroke="#21262d" stroke-width="1"/>
  <line x1="80" y1="70"  x2="640" y2="70"  stroke="#21262d" stroke-width="1"/>
  <text x="68" y="224" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">0</text>
  <text x="68" y="174" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">500</text>
  <text x="68" y="124" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">1,000</text>
  <text x="68" y="74"  font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="end">1,500</text>

  <rect x="130" y="220" width="80" height="0" fill="#1f6feb" rx="4">
    <animate attributeName="height" from="0" to="92" dur="0.7s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="128" dur="0.7s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="170" y="120" font-family="sans-serif" font-size="12" fill="#58a6ff" text-anchor="middle" font-weight="bold" opacity="0">
    1,149 req/s
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="0.85s" fill="freeze"/>
  </text>
  <text x="170" y="240" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">10 concurrent</text>
  <text x="170" y="254" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="middle">(100건)</text>

  <rect x="300" y="220" width="80" height="0" fill="#238636" rx="4">
    <animate attributeName="height" from="0" to="115" dur="0.7s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="105" dur="0.7s" begin="0.45s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="340" y="97" font-family="sans-serif" font-size="12" fill="#3fb950" text-anchor="middle" font-weight="bold" opacity="0">
    1,435 req/s
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.1s" fill="freeze"/>
  </text>
  <text x="340" y="240" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">50 concurrent</text>
  <text x="340" y="254" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="middle">(300건)</text>

  <rect x="470" y="220" width="80" height="0" fill="#9e6a03" rx="4">
    <animate attributeName="height" from="0" to="150" dur="0.7s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
    <animate attributeName="y" from="220" to="70" dur="0.7s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.25 0.1 0.25 1"/>
  </rect>
  <text x="510" y="62" font-family="sans-serif" font-size="12" fill="#d29922" text-anchor="middle" font-weight="bold" opacity="0">
    2,427 req/s ★
    <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="1.35s" fill="freeze"/>
  </text>
  <text x="510" y="240" font-family="sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">100 concurrent</text>
  <text x="510" y="254" font-family="sans-serif" font-size="10" fill="#484f58" text-anchor="middle">(500건)</text>

  <text x="640" y="272" font-family="sans-serif" font-size="10" fill="#30363d" text-anchor="end">Node.js v24 / Windows 11 / perf_test.js</text>
</svg>
