<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
body {
    margin: 0;
    background: linear-gradient(#87ceeb, #dff6ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    overflow: hidden;
}

canvas {
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

#ui {
    position: absolute;
    top: 20px;
    left: 20px;
    font-weight: bold;
    color: #222;
}

#menu {
    position: absolute;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

#start { background: #2ecc71; }
#restart { background: #e74c3c; }
</style>
</head>

<body>

<div id="ui">
    <div id="score">Score: 0</div>
    <div id="lives">Lives: ❤️❤️❤️❤️❤️</div>
    <div id="stage">Stage: 1</div>
</div>

<div id="menu">
    <h1>🚗 SUNNY ROAD</h1>
    <button id="start">START</button>
    <button id="restart">RESTART</button>
</div>

<canvas id="game" width="420" height="650"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

let state = "menu";

let car = { x: 180, y: 520 };
let obs = [];

let score = 0;
let lives = 5;
let stage = 1;

let roadOffset = 0;
let treeOffset = 0;

let keys = {};

// =========================
// INPUT
// =========================
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// =========================
// UI
// =========================
document.getElementById("start").onclick = () => {
    state = "play";
    document.getElementById("menu").style.display = "none";
};

document.getElementById("restart").onclick = () => {
    reset();
    state = "play";
    document.getElementById("menu").style.display = "none";
};

function reset() {
    car = { x: 180, y: 520 };
    obs = [];
    score = 0;
    lives = 5;
    stage = 1;
}

// =========================
// ROAD + TREES (LIFE FEEL)
// =========================
function drawScene() {
    // 하늘
    ctx.fillStyle = "#87ceeb";
    ctx.fillRect(0, 0, 420, 650);

    // 길
    ctx.fillStyle = "#5d6d7e";
    ctx.fillRect(60, 0, 300, 650);

    // 중앙선
    roadOffset += 4;
    if (roadOffset > 50) roadOffset = 0;

    for (let i = 0; i < 15; i++) {
        ctx.fillStyle = "#f1c40f";
        ctx.fillRect(205, i * 50 + roadOffset, 6, 25);
    }

    // 나무 (좌우 스크롤)
    treeOffset += 3;
    if (treeOffset > 80) treeOffset = 0;

    for (let i = 0; i < 10; i++) {
        let y = i * 80 + treeOffset;

        // 왼쪽 나무
        drawTree(30, y);
        // 오른쪽 나무
        drawTree(390, y);
    }
}

function drawTree(x, y) {
    ctx.fillStyle = "#8d5524";
    ctx.fillRect(x - 5, y + 20, 10, 30);

    ctx.fillStyle = "#2ecc71";
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fill();
}

// =========================
// CAR
// =========================
function drawCar(x, y, color) {
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.fillRect(x + 3, y + 3, 45, 80);

    ctx.fillStyle = color;
    ctx.fillRect(x, y, 45, 80);

    ctx.fillStyle = "#ecf0f1";
    ctx.fillRect(x + 5, y + 10, 35, 20);

    ctx.fillStyle = "#f1c40f";
    ctx.fillRect(x + 5, y + 75, 10, 4);
    ctx.fillRect(x + 30, y + 75, 10, 4);
}

// =========================
// LOOP
// =========================
function loop() {
    requestAnimationFrame(loop);

    if (state !== "play") return;

    drawScene();

    stage = Math.floor(score / 150) + 1;
    let speed = 4 + stage * 0.5;

    // =========================
    // OBSTACLE (NOT FULL BLOCK)
    // =========================
    if (obs.length < 5) {
        let lane = Math.floor(Math.random() * 5);

        obs.push({
            x: 70 + lane * 60,
            y: -100
        });
    }

    obs.forEach((o, i) => {
        o.y += speed;

        drawCar(o.x, o.y, "#3498db");

        if (o.y > 700) {
            obs.splice(i, 1);
            score += 10;
        }

        // 충돌 (감소 방식)
        if (
            o.y > car.y - 50 &&
            o.y < car.y + 50 &&
            Math.abs(o.x - car.x) < 35
        ) {
            lives--;
            score -= 20;
            o.y = -200;
        }
    });

    // =========================
    // MOVE
    // =========================
    if (keys["ArrowLeft"]) car.x -= 6;
    if (keys["ArrowRight"]) car.x += 6;

    car.x = Math.max(70, Math.min(310, car.x));

    drawCar(car.x, car.y, "#e74c3c");

    // =========================
    // UI
    // =========================
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("lives").innerText = "Lives: " + "❤️".repeat(Math.max(0, lives));
    document.getElementById("stage").innerText = "Stage: " + stage;

    // =========================
    // GAME END
    // =========================
    if (lives <= 0) {
        state = "menu";

        document.getElementById("menu").style.display = "block";
        document.querySelector("#menu h1").innerText =
            `🏁 GAME OVER\nScore: ${score}`;
    }
}

loop();
</script>

</body>
</html>
