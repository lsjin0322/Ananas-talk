<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>

<style>

* {
  margin: 0;
  box-sizing: border-box;
}


body {
  background-color: white;
  padding: 20px;
  font-family: Arial, sans-serif;
}


.header {
  position: relative; 
  display: flex;
  align-items: center;
  background: rgb(202, 202, 202);
  padding: 10px;
}


.logo {
  background: yellow;
  padding: 10px 20px;
  color: rgb(214, 143, 10);
  font-weight: bold;
}


.title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  color: black;
}


.menu {
  position: absolute;
  right: 40px;
  bottom: 10px;  
  
  display: flex;
  gap: 40px;
  color: white;
}



.main {
  display: flex;
  margin-top: 10px;
  gap: 10px;
}

.sidebar {
  flex: 1;
  background: rgb(202, 202, 202);
  padding: 20px;
}

.content {
  flex: 3;
}


.post {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}


.sidebar {
  flex: 1;
  background: rgb(202, 202, 202);
  padding: 20px;
}


.footer {
  margin-top: 10px;
  background: rgb(202, 202, 202);
  text-align: center;
  padding: 15px;
}


@media (max-width: 768px) {
  .main {
    flex-direction: column;
  }
}


</style>
</head>

<body>

<header class="header">
  <div class="logo">로고</div>
  <div class="title">Header</div>
  <div class="menu">
  <span>메뉴1</span>
  <span>메뉴1</span>
  <span>메뉴1</span>
</div>
</header>

<main class="main">
  <div class="content">
    <div class="post">첫 번째 포스트</div>
    <div class="post">두 번째 포스트</div>
    <div class="post">세 번째 포스트</div>
  </div>

  <aside class="sidebar">
    Right Content (Sidebar)
  </aside>
</main>

<footer class="footer">
  Footer
</footer>

</body>
</html>
