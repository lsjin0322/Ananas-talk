<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘 날씨, 오늘의 마음 - 문구 상세</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-card {
            background-color: var(--color-quote);
            border-radius: 16px;
            padding: 35px 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 3px 3px 0px rgba(0,0,0,0.05);
        }
        .comment-box {
            background: #fff;
            border: 1px solid var(--grid-color);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
        }
        .action-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .action-btn {
            background: #fff;
            border: 1px solid var(--grid-color);
            border-radius: 10px;
            padding: 12px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="app-header">
            <button class="back-btn" onclick="location.href='emotion.html'">←</button>
            <span style="font-weight: bold; font-size: 16px;">문구 상세</span>
            <span style="font-size: 16px; cursor:pointer;">☆</span>
        </div>

        <div class="content">
            <div class="detail-card">
                <p id="detail-quote" style="font-size: 16px; font-weight: bold; line-height: 1.5;"></p>
            </div>

            <div class="comment-box">
                <p style="font-size: 12px; font-weight: bold; color: #888; margin-bottom: 5px;">오늘의 마음 코멘트</p>
                <p id="comment-text" style="font-size: 13px; line-height: 1.4;"></p>
            </div>

            <div class="action-grid">
                <button class="action-btn" onclick="alert('복사되었습니다.')">📄<br><span style="margin-top:4px; display:inline-block;">복사하기</span></button>
                <button class="action-btn" onclick="alert('공유 링크가 생성되었습니다.')">🔗<br><span style="margin-top:4px; display:inline-block;">공유하기</span></button>
                <button class="action-btn" onclick="alert('기록장에 저장되었습니다.')">✏️<br><span style="margin-top:4px; display:inline-block;">기록하기</span></button>
            </div>
        </div>

        <div class="nav-bar">
            <a href="index.html" class="nav-item"><span>🌤️</span>오늘</a>
            <a href="emotion.html" class="nav-item"><span style="color:#4a3f35;">❤️</span>마음</a>
            <a href="setting.html" class="nav-item"><span>⚙️</span>설정</a>
        </div>
    </div>

    <script>
        window.onload = function() {
            const emotion = localStorage.getItem('userEmotion') || '평온함';
            
            const data = {
                '지침': {
                    quote: "지금의 속도도 충분히 괜찮아요.",
                    comment: "흐린 날은 천천히 가도 되는 날이에요. 내 마음이 원하는 속도로 가보세요."
                },
                '불안함': {
                    quote: "잠시 숨을 크게 들이쉬고 내쉬어보세요.",
                    comment: "불안이 찾아오는 건 당신이 잘 해내고 싶다는 증거입니다. 걱정 마세요."
                },
                '평온함': {
                    quote: "평범한 오늘이 주는 고요함을 즐겨보세요.",
                    comment: "아무 일도 일어나지 않은 오늘은, 실은 가장 안전하고 평화로운 하루입니다."
                },
                '기분 좋음': {
                    quote: "오늘의 햇살처럼 환하게 웃어보세요.",
                    comment: "당신의 기분 좋은 미소가 주위의 공기까지 화사하게 바꿔줄 거예요."
                },
                '집중 필요': {
                    quote: "시선은 오직 눈앞의 한 걸음에만.",
                    comment: "너무 먼 미래를 보지 말고, 지금 당장 시작할 수 있는 작은 일에 집중해봐요."
                }
            };

            document.getElementById('detail-quote').innerText = `“ ${data[emotion].quote} ”`;
            document.getElementById('comment-text').innerText = data[emotion].comment;
        }
    </script>
</body>
</html>
