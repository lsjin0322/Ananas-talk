<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>설정</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        input[type="text"] {
            border: none; background: rgba(0,0,0,0.05); padding: 8px 12px; border-radius: 10px; text-align: right;
        }
        .toggle {
            width: 40px; height: 20px; background: #ccc; border-radius: 20px; position: relative; cursor: pointer;
        }
        .toggle.on { background: #a1c4fd; }
        .toggle-circle {
            width: 16px; height: 16px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 2px; transition: 0.3s;
        }
        .toggle.on .toggle-circle { left: 22px; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div style="padding: 40px 25px;">
            <h2 style="color: var(--text);">설정</h2>
            
            <div class="glass-card" style="margin-top: 20px;">
                <div class="setting-row">
                    <span>이름</span>
                    <input type="text" id="name-input" placeholder="이름 입력" onchange="updateName(this.value)">
                </div>
                
                <div class="setting-row">
                    <span>야간 테마</span>
                    <div id="theme-toggle" class="toggle" onclick="toggleTheme()">
                        <div class="toggle-circle"></div>
                    </div>
                </div>

                <div class="setting-row">
                    <span>푸시 알림</span>
                    <div id="notif-toggle" class="toggle on" onclick="this.classList.toggle('on')">
                        <div class="toggle-circle"></div>
                    </div>
                </div>
            </div>

            <p style="text-align: center; font-size: 12px; color: #999; margin-top: 30px;">당신의 마음을 항상 응원합니다. v1.0</p>
        </div>

        <nav class="nav-bar">
            <a href="index.html" class="nav-item"><i>🌤️</i>오늘</a>
            <a href="emotion.html" class="nav-item"><i>❤️</i>마음</a>
            <a href="setting.html" class="nav-item active"><i>⚙️</i>설정</a>
        </nav>
    </div>

    <script>
        // 데이터 로드
        document.getElementById('name-input').value = localStorage.getItem('userName') || '';
        if(localStorage.getItem('appTheme') === 'night') {
            document.getElementById('theme-toggle').classList.add('on');
        }

        function updateName(val) {
            localStorage.setItem('userName', val);
        }

        function toggleTheme() {
            const btn = document.getElementById('theme-toggle');
            btn.classList.toggle('on');
            if(btn.classList.contains('on')) {
                localStorage.setItem('appTheme', 'night');
            } else {
                localStorage.setItem('appTheme', 'day');
            }
        }
    </script>
</body>
</html>
